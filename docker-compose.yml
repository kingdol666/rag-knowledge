# ============================================================
# RAG Knowledge Platform — Infrastructure Services
#
# Provides Neo4j for the knowledge-graph feature.
# Backend / Web / MinerU 不容器化（需 GPU/OCR + 热重载），直接 host 运行。
#
# Usage:
#   docker compose up -d neo4j        # 启动图数据库
#   docker compose logs -f neo4j      # 查看日志
#   docker compose down               # 停止（保留数据卷）
#   docker compose down -v            # 停止并删除数据卷（重置密码/清空数据）
#
# 密码配置（单一来源）:
#   读取 .env 中的 NEO4J_PASSWORD（默认 123456，生产环境务必修改）。
#   后端 config.yml 的 graph.password 也用 ${NEO4J_PASSWORD}，三者自动一致。
#
#   ⚠️ NEO4J_AUTH 仅在数据卷首次创建时生效。若要改密码：
#      docker compose down -v && docker compose up -d
#      （会清空图数据，可用 build_kb_graph 重建）
#
#   ⚠️ 不要向容器传 NEO4J_PASSWORD 变量——Neo4j 会把它当作非法配置项
#      （PASSWORD 不是合法 config key）导致启动失败。健康检查里 docker-compose
#      在构建期直接把密码插值进命令字符串，容器内不暴露该变量。
# ============================================================

services:
  neo4j:
    image: neo4j:5.20-community
    container_name: rag-knowledge-neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"   # Neo4j Browser UI (http://localhost:7474)
      - "7687:7687"   # Bolt protocol (backend 连接此端口)
    environment:
      # 密码从 .env 的 NEO4J_PASSWORD 读取（与后端 config.yml 同源）
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD:-123456}
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_security_auth__minimum__password__length=6
      # 内存配置（按宿主机内存的 50-60% 调整）
      - NEO4J_server_memory_heap_initial__size=1G
      - NEO4J_server_memory_heap_max__size=2G
      - NEO4J_server_memory_pagecache_size=1G
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    networks:
      - rag-net
    healthcheck:
      # docker-compose 在构建期把 ${NEO4J_PASSWORD} 替换为 .env 中的字面值，
      # 容器内看到的是具体密码，不依赖任何 NEO4J_* 变量（避免配置冲突）。
      test: ["CMD-SHELL", "cypher-shell -a bolt://localhost:7687 -u neo4j -p ${NEO4J_PASSWORD:-123456} 'RETURN 1' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 4G

volumes:
  neo4j_data:
    name: rag-knowledge-neo4j-data
  neo4j_logs:
    name: rag-knowledge-neo4j-logs

networks:
  rag-net:
    name: rag-knowledge-net
    driver: bridge
