# ============================================
# RAG Knowledge Platform — Neo4j Graph Database
# ============================================
# Start:  docker compose up -d neo4j
# Stop:   docker compose down
# Web UI: http://localhost:7474 (neo4j / ${NEO4J_PASSWORD})
# Bolt:   bolt://localhost:7687
# The password is read from .env (NEO4J_PASSWORD, defaults to 123456).

version: "3.8"

services:
  neo4j:
    image: neo4j:5.26-community
    container_name: rag-knowledge-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD:-123456}
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_server_memory_heap_initial__size=512m
      - NEO4J_server_memory_heap_max__size=1g
      - NEO4J_server_memory_pagecache_size=512m
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "${NEO4J_PASSWORD:-123456}", "RETURN 1"]
      interval: 15s
      timeout: 10s
      retries: 10

volumes:
  neo4j-data:
  neo4j-logs:
