display_name: Knowledge Store
short_description: >
  Dual-mode knowledge librarian. User-facing: classify, parse, tag, and store
  documents via kb-mcp. Module mode: silent storage backend for other skills
  (deep-research, web-search) to persist findings with automatic KB routing,
  tag selection, and description writing.
default_prompt: >
  Store these documents into the knowledge base. Survey existing KBs first,
  match each document to the right KB (or create one), parse binary formats
  through MinerU, tag with existing vocabulary, write accurate descriptions,
  and report what was stored where.
