display_name: Knowledge Administrator
short_description: >
  Delegates knowledge-base tasks to Archival, an expert sub-agent with 20 years
  of information science experience. Handles document ingestion, KB organization,
  quality maintenance, content discovery, and proactive advisory. Dual-mode:
  interactive for users, silent JSON output for other agents.
default_prompt: >
  I need help managing my knowledge base. Spawn Archival, the knowledge
  administrator sub-agent, to handle this autonomously.
