display_name: Knowledge Administrator
short_description: >
  Full-spectrum knowledge base administrator. Handles document ingestion (parse
  or direct upload with smart KB routing, tagging, and description), KB
  organization (move, merge, rename, delete), quality maintenance (tag audits,
  duplicate detection, parse verification), discovery (inventory, search,
  drill-down), and proactive health recommendations. Dual-mode: interactive
  librarian for users, silent storage module for other agents.
default_prompt: >
  I need help managing my knowledge base. Understand what I am trying to do
  (store, organize, clean up, or find), survey the current state, make smart
  decisions about routing and tagging, and execute with quality.
