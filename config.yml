# ============================================
# RAG Knowledge Platform — 前后端共用启动配置
# ============================================
# 这是唯一的端口配置来源，前后端启动时自动读取。
# 修改此文件后重启对应服务即可生效。
# .env 中的同名变量会覆盖此文件中的值。
# ============================================

server:
  # ── 跨域：允许所有来源，完美解决前后端分离的 CORS 问题 ──
  cors_origins:
    - "*"

  # ── Dev 模式（热重载）─
  dev:
    host: "0.0.0.0"
    backend_port: 8765
    frontend_port: 6789
    backend_url: "http://localhost:8765"  

  # ── Prod 模式（生产部署）─
  prod:
    host: "0.0.0.0"
    backend_port: 8001
    frontend_port: 3000
    backend_url: "http://localhost:8001"

# ============================================
# 存储路径配置（前后端共享）
# ============================================
# 后端需通过此路径读取 .tree-fs.json、文档正文等。
# .env 的 TREE_STORAGE_PATH 优先级最高。
# ============================================
storage:
  # web 端 tree-file-system 的相对或绝对路径
  # 相对路径基于项目根目录（rag-knowledge/）
  tree_fs_root: "./web/storage/tree-file-system"

# ============================================
# 向量检索配置
# ============================================
vector:
  enabled: true
  # ChromaDB 持久化目录（相对项目根）
  persist_dir: "./chroma_db"
  collection_prefix: "kb_"
  chunk_size: 500
  chunk_overlap: 50
  top_k: 5
  score_threshold: 0.35  # 0.55 对长文档片段过严（bge-m3 余弦多在 0.3-0.5 被滤掉致 count=0），降到 0.35；MCP 工具支持按查询覆盖
  experience_score_threshold: 0.55  # 经验是聚焦短内容，相似度分布更高；0.35 会把无关 query（如"红烧肉"0.40-0.45）错判为相关。实测 0.55 完美分离无关(≤0.45)/相关(≥0.65)

# ============================================
# Embedding 模型配置
# ============================================
embedding:
  model_name: "BAAI/bge-m3"
  # 模型缓存目录（相对项目根）
  cache_dir: "./models_cache"
  device: "auto"    # auto → CUDA if available, else CPU
  batch_size: 32
  normalize: true

# ============================================
# 知识图谱配置（Neo4j）
# ============================================
graph:
  enabled: true
  uri: "bolt://127.0.0.1:7687"
  username: "neo4j"
  # 支持 ${NEO4J_PASSWORD} 语法从环境变量读取，避免明文存储
  password: "${NEO4J_PASSWORD}"
  database: "neo4j"
  # 连接池配置（可选，详见 doc；gds 版本须注释 max_connection_pool_size）
  pool:
    max_connection_pool_size: 50
    connection_acquisition_timeout: 30  # 秒
    max_connection_lifetime: 3600       # 秒（1 小时）
  # 瞬态失败重试策略（网络闪断等）
  retry:
    max_attempts: 3
    base_delay: 0.5  # 秒（指数退避：0.5→1.0→2.0）
  # NER 实体识别配置（transformers + PyTorch，中英文双模型自动切换）
  ner:
    model_zh: ckiplab/bert-base-chinese-ner   # 中文 NER（BIOES）
    model_en: dslim/bert-base-NER             # 英文 NER（BIO）
    max_text_length: 50000  # 超长文档截断字符数
    types:                  # 原始标签 → 友好类型映射
      PER: PER
      PERSON: PER
      LOC: LOC
      ORG: ORG
      GPE: GPE
      MISC: MISC
  # 关系抽取配置
  relation:
    use_cooccurrence: true   # 同句实体共现
    use_dependency: true     # 依存句法（nsubj/dobj）
    use_pattern: true        # 正则模板（子公司/收购/投资等）

# ============================================
# 两阶段检索配置
# ============================================
search:
  two_stage:
    enabled: true
    stage1_top_k: 20
    stage2_top_k: 5
    stage1_keyword_weight: 0.5
    stage1_graph_weight: 0.5
    graph_neighbor_depth: 1
    min_candidates: 3
