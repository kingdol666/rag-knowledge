# ============================================
# RAG Knowledge Platform — 前后端共用启动配置
# ============================================
# 这是唯一的端口配置来源，前后端启动时自动读取。
# 修改此文件后重启对应服务即可生效。
# ============================================

server:
  # ── 跨域：允许所有来源，完美解决前后端分离的 CORS 问题 ──
  cors_origins:
    - "*"

  # ── Dev 模式（npm run dev / python main.py）─
  dev:
    host: "0.0.0.0"
    backend_port: 8765
    frontend_port: 6789
    backend_url: "http://localhost:8765"

  # ── Prod 模式（npm run build && npm run preview / uvicorn without reload）─
  prod:
    host: "0.0.0.0"
    backend_port: 8001
    frontend_port: 3000
    backend_url: "http://localhost:8001"
