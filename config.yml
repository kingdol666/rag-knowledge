# ============================================
# RAG Knowledge Platform - Shared Configuration
# ============================================
# Single source of truth for ports and shared settings.
# Env vars in .env override values here.
# ============================================

# -- Server (ports, CORS, host) --
server:
  cors_origins:
    - "*"
  auth:
    enabled: false
  dev:
    host: "0.0.0.0"
    backend_port: 8765
    frontend_port: 6789
    backend_url: "http://localhost:8765"
  prod:
    host: "0.0.0.0"
    backend_port: 8001
    frontend_port: 3000
    backend_url: "http://localhost:8001"

# -- Storage (tree-file-system path) --
storage:
  tree_fs_root: "./storage/tree-file-system"

# -- Vector Search (ChromaDB) --
vector:
  enabled: true
  persist_dir: "./chroma_db"
  collection_prefix: "kb_"
  chunk_size: 500
  chunk_overlap: 50
  top_k: 5
  score_threshold: 0.35
  experience_score_threshold: 0.55

# -- Embedding Model --
embedding:
  model_name: "BAAI/bge-m3"
  cache_dir: "./models_cache"
  device: "auto"
  batch_size: 32
  normalize: true

# -- Knowledge Graph (Neo4j) --
graph:
  enabled: true
  uri: "bolt://127.0.0.1:7687"
  username: "neo4j"
  password: "${NEO4J_PASSWORD:-123456}"
  database: "neo4j"
  pool:
    max_connection_pool_size: 50
    connection_acquisition_timeout: 30
    max_connection_lifetime: 3600
  retry:
    max_attempts: 3
    base_delay: 0.5
  relation: "None"

# -- Two-Stage Search --
search:
  two_stage:
    enabled: true
    stage1_top_k: 20
    stage2_top_k: 5
    stage1_keyword_weight: 0.5
    stage1_graph_weight: 0.5
    graph_neighbor_depth: 1
    min_candidates: 3
