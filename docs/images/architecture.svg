<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 540" width="900" height="540" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" role="img" aria-label="RAG Knowledge Platform architecture">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#64748b"/>
    </marker>
    <linearGradient id="gIndigo" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eef2ff"/><stop offset="100%" stop-color="#e0e7ff"/>
    </linearGradient>
    <linearGradient id="gViolet" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5f3ff"/><stop offset="100%" stop-color="#ede9fe"/>
    </linearGradient>
    <linearGradient id="gCyan" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ecfeff"/><stop offset="100%" stop-color="#cffafe"/>
    </linearGradient>
    <linearGradient id="gAmber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fffbeb"/><stop offset="100%" stop-color="#fef3c7"/>
    </linearGradient>
    <linearGradient id="gAccent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4f46e5"/><stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
  </defs>

  <!-- Title -->
  <text x="450" y="34" text-anchor="middle" font-size="20" font-weight="700" fill="#0f172a">RAG Knowledge Platform — Architecture</text>

  <!-- Layer 1: Agent -->
  <g>
    <rect x="140" y="58" width="620" height="64" rx="14" fill="url(#gIndigo)" stroke="#4f46e5" stroke-width="1.5"/>
    <text x="450" y="86" text-anchor="middle" font-size="16" font-weight="700" fill="#3730a3">Claude Code · AI Agent · MCP Client</text>
    <text x="450" y="106" text-anchor="middle" font-size="12.5" fill="#475569">natural-language commands → 14 skills → 76 MCP tools</text>
  </g>
  <line x1="450" y1="124" x2="450" y2="150" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Layer 2: kb-mcp -->
  <g>
    <rect x="140" y="154" width="620" height="64" rx="14" fill="url(#gViolet)" stroke="#7c3aed" stroke-width="1.5"/>
    <text x="450" y="182" text-anchor="middle" font-size="16" font-weight="700" fill="#5b21b6">kb-mcp MCP Server · 76 tools · project_manager</text>
    <text x="450" y="202" text-anchor="middle" font-size="12.5" fill="#475569">FastMCP · Python · kb_project_start / kb_project_status / kb_project_preflight</text>
  </g>

  <!-- Fan-out arrows -->
  <path d="M360 220 L360 240 L260 240 L260 258" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M540 220 L540 240 L640 240 L640 258" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Layer 3: Web + Backend -->
  <g>
    <rect x="140" y="262" width="240" height="92" rx="14" fill="url(#gCyan)" stroke="#0891b2" stroke-width="1.5"/>
    <text x="260" y="290" text-anchor="middle" font-size="15" font-weight="700" fill="#155e75">Nuxt 3 Web (proxy)</text>
    <text x="260" y="312" text-anchor="middle" font-size="13" fill="#0e7490" font-weight="600">:6789 (dev) · :3000 (prod)</text>
    <text x="260" y="332" text-anchor="middle" font-size="11.5" fill="#475569">server-to-server proxy · KB UI</text>
  </g>
  <g>
    <rect x="520" y="262" width="240" height="92" rx="14" fill="url(#gCyan)" stroke="#0891b2" stroke-width="1.5"/>
    <text x="640" y="290" text-anchor="middle" font-size="15" font-weight="700" fill="#155e75">FastAPI Backend</text>
    <text x="640" y="312" text-anchor="middle" font-size="13" fill="#0e7490" font-weight="600">:8765 (dev) · :8001 (prod)</text>
    <text x="640" y="332" text-anchor="middle" font-size="11.5" fill="#475569">parse scheduling · MinerU subprocess</text>
    <!-- MinerU chip -->
    <rect x="556" y="364" width="168" height="26" rx="8" fill="#ffffff" stroke="#94a3b8" stroke-width="1"/>
    <text x="640" y="381" text-anchor="middle" font-size="11.5" fill="#334155">MinerU OCR (ephemeral port)</text>
    <line x1="640" y1="354" x2="640" y2="364" stroke="#94a3b8" stroke-width="1.5"/>
  </g>

  <!-- proxy link between web and backend -->
  <line x1="380" y1="300" x2="520" y2="300" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4 4"/>
  <text x="450" y="294" text-anchor="middle" font-size="10.5" fill="#64748b">proxy</text>

  <!-- arrows to storage -->
  <path d="M260 392 L260 430 L450 430 L450 446" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M640 392 L640 430 L450 430" fill="none" stroke="#64748b" stroke-width="2"/>

  <!-- Layer 4: Storage -->
  <g>
    <rect x="140" y="450" width="620" height="58" rx="14" fill="url(#gAmber)" stroke="#d97706" stroke-width="1.5"/>
    <text x="450" y="476" text-anchor="middle" font-size="15" font-weight="700" fill="#92400e">Storage · all local, zero cloud</text>
    <text x="450" y="496" text-anchor="middle" font-size="12.5" fill="#78350f">.tree-fs.json · .knowledge-base.yml · Neo4j (:7687) · BGE-M3 (1024-dim)</text>
  </g>

  <!-- Launcher footer ribbon -->
  <rect x="140" y="522" width="620" height="0" fill="none"/>
</svg>
