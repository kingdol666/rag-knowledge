<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256" role="img" aria-label="RAG Knowledge Platform logo">
  <defs>
    <!-- Premium indigo → violet → cyan-diagonal badge gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#4338ca"/>
      <stop offset="45%" stop-color="#6d28d9"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
    <!-- Top-left gloss highlight -->
    <radialGradient id="gloss" cx="0.28" cy="0.22" r="0.85">
      <stop offset="0%"  stop-color="#ffffff" stop-opacity="0.45"/>
      <stop offset="55%" stop-color="#ffffff" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <!-- Node gradient (cyan glow) -->
    <radialGradient id="nodeGrad" cx="0.35" cy="0.3" r="0.8">
      <stop offset="0%"  stop-color="#ecfeff"/>
      <stop offset="45%" stop-color="#67e8f9"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </radialGradient>
    <!-- Soft shadow for the document card -->
    <filter id="cardShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
      <feOffset dx="0" dy="4" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Node glow -->
    <filter id="nodeGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="3.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Badge -->
  <rect x="6" y="6" width="244" height="244" rx="58" fill="url(#bg)"/>
  <rect x="6" y="6" width="244" height="244" rx="58" fill="url(#gloss)"/>
  <!-- subtle inner ring -->
  <rect x="6" y="6" width="244" height="244" rx="58" fill="none" stroke="#ffffff" stroke-opacity="0.18" stroke-width="2"/>

  <!-- Knowledge-graph edges (drawn behind the document so they appear to emerge from it) -->
  <g stroke="#ffffff" stroke-opacity="0.7" stroke-width="3" stroke-linecap="round" fill="none">
    <line x1="128" y1="132" x2="60"  y2="74"/>
    <line x1="128" y1="132" x2="198" y2="72"/>
    <line x1="128" y1="132" x2="66"  y2="196"/>
    <line x1="128" y1="132" x2="202" y2="192"/>
    <line x1="60"  y1="74"  x2="198" y2="72"  stroke-opacity="0.35"/>
    <line x1="66"  y1="196" x2="202" y2="192" stroke-opacity="0.35"/>
  </g>

  <!-- Document card (the knowledge source at the center) -->
  <g filter="url(#cardShadow)">
    <rect x="84" y="82" width="88" height="110" rx="14" fill="#ffffff"/>
    <!-- folded corner -->
    <path d="M154 82 L172 100 L154 100 Z" fill="#c7d2fe"/>
    <path d="M154 82 L172 100 L154 100 Z" fill="none" stroke="#a5b4fc" stroke-width="1"/>
    <!-- text lines -->
    <g fill="#4f46e5">
      <rect x="96"  y="104" width="50" height="6.5" rx="3.25" opacity="0.9"/>
      <rect x="96"  y="120" width="64" height="6.5" rx="3.25" opacity="0.75"/>
      <rect x="96"  y="136" width="44" height="6.5" rx="3.25" opacity="0.65"/>
      <rect x="96"  y="152" width="58" height="6.5" rx="3.25" opacity="0.55"/>
      <rect x="96"  y="168" width="36" height="6.5" rx="3.25" opacity="0.45"/>
    </g>
  </g>

  <!-- Knowledge-graph nodes -->
  <g filter="url(#nodeGlow)">
    <circle cx="60"  cy="74"  r="13" fill="url(#nodeGrad)"/>
    <circle cx="198" cy="72"  r="13" fill="url(#nodeGrad)"/>
    <circle cx="66"  cy="196" r="11" fill="url(#nodeGrad)"/>
    <circle cx="202" cy="192" r="11" fill="url(#nodeGrad)"/>
    <!-- central hub sitting on the document -->
    <circle cx="128" cy="132" r="10" fill="#ffffff"/>
    <circle cx="128" cy="132" r="10" fill="none" stroke="#0ea5e9" stroke-width="2.5"/>
  </g>
</svg>
